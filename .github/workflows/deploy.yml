name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Mapbox token
        env:
          MB_T1: ${{ secrets.MAPBOX_T1 }}
          MB_T2: ${{ secrets.MAPBOX_T2 }}
        run: |
          echo "const CONFIG = { MAPBOX_TOKEN: '${MB_T1}${MB_T2}' };" \
            > frontend/config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
